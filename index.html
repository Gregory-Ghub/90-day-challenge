<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#c8860a">
  <meta name="description" content="Greg's 90-Day Strength Challenge tracker">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Greg's 90-Day Challenge</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>
    // Apply saved theme before CSS loads to prevent flash of wrong theme
    (function() {
      var t = localStorage.getItem('selected-theme');
      if (t && t !== 'gold') document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/milestones.css">
</head>
<body>
  <header id="app-header">
    <h1 id="header-title">Greg's 90-Day Challenge</h1>
    <button id="settings-btn" aria-label="Settings">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </header>

  <main id="app-content"></main>

  <nav id="bottom-nav"></nav>

  <div id="toast-container"></div>
  <div id="celebration-overlay" class="hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
